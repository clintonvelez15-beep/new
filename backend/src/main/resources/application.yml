server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/health_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 9293
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true  # 下划线转驼峰
  global-config:
    db-config:
      id-type: auto
      column-format: "`%s`"  # 防止关键字冲突

# DeepSeek API配置
deepseek:
  api-key: sk-
  api-url: https://api.deepseek.com/v1/chat/completions
  model: deepseek-chat
